server:
  port: 7878
  servlet:
    context-path: /

spring:
  application:
    name: bank-admin
  datasource:
    # 本地开发数据库配置
    url: jdbc:mysql://localhost:3306/bank_admin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.bank.admin.module
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: bank-admin-jwt-secret-key-2024-very-long-secret
  expiration: 86400000

# 日志
logging:
  level:
    com.bank.admin: debug
